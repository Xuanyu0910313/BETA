<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學生會意見平台 - 旗艦版 0.5.9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --admin: #e74c3c; --student: #2ecc71; --viewer: #3498db; --card-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        /* 增加 transition 讓背景換色時有平滑效果 */
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 50px; transition: background 0.5s ease; }
        nav { background: #fff; color: #2c3e50; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* 管理員區 */
        .admin-card { border: 2.5px solid var(--admin); border-radius: 16px; padding: 25px; background: white; margin-bottom: 25px; }
        
        /* 搜尋列 */
        .search-container { background: white; border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; box-shadow: var(--card-shadow); margin-bottom: 20px; border: 1px solid #eee; }
        .search-container input { border: none; padding: 12px; outline: none; flex-grow: 1; font-size: 16px; background: transparent; }
        
        /* 分類標籤 */
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .filter-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; white-space: nowrap; transition: 0.2s; color: #666; font-weight: bold; }
        .filter-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; }

        /* 卡片設計 */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: var(--card-shadow); margin-bottom: 25px; }
        .feedback-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0; position: relative; transition: 0.3s; }
        .tag { font-size: 0.75rem; background: #f0f2f5; padding: 4px 12px; border-radius: 8px; color: #555; font-weight: bold; margin-bottom: 12px; display: inline-block; }
        
        /* 按鈕樣式 */
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn:active { transform: scale(0.98); }
        textarea, select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .hidden { display: none !important; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body id="main-body">

<div id="loading" class="loading-overlay">
    <div style="width: 45px; height: 45px; border: 5px solid #f3f3f3; border-top: 5px solid var(--viewer); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 15px; color: #666; font-weight: bold;">正在同步雲端資料庫...</p>
</div>

<nav>
    <div style="font-weight: 800; font-size: 1.2rem; letter-spacing: 1px;">🏫 學生會意見平台</div>
    <div id="status-tag" style="font-size: 0.8rem; background: #eee; padding: 5px 12px; border-radius: 20px; font-weight: bold;">連線中</div>
</nav>

<div class="container">
    <section id="area-admin" class="admin-card hidden">
        <h3 style="color: var(--admin); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">⚙️ 管理員工具箱</h3>
        <label><b>📢 發布最新公告：</b></label>
        <textarea id="input-notice" rows="2" placeholder="輸入公告內容..."></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div><label><b>修改平台題目：</b></label><input type="text" id="input-title"></div>
            <div><label><b>分類標籤(逗號隔開)：</b></label><input type="text" id="input-categories"></div>
        </div>

        <div style="display: flex; gap: 15px; align-items: center; background: #f9f9f9; padding: 15px; border-radius: 12px;">
            <label><b>🎨 網頁背景顏色：</b></label>
            <input type="color" id="bg-picker" style="width: 60px; height: 35px; border:none; cursor:pointer;">
            <button class="btn" style="background: var(--admin); color: white; flex-grow: 1;" onclick="saveConfig()">🚀 儲存並同步至雲端</button>
            <button class="btn" style="background: #217346; color: white;" onclick="exportToCSV()">📊 匯出資料</button>
        </div>
        
        <div id="qr-student" style="margin-top: 15px; text-align:center; background:white; padding:10px; border-radius:10px; border:1px solid #eee; display: inline-block;"></div>
    </section>

    <section id="area-notice" class="card hidden" style="background: #fff9db; border: 2px solid #f59f00; padding: 20px;">
        <div id="notice-content" style="white-space: pre-wrap; line-height: 1.7; color: #856404; font-weight: 500;"></div>
    </section>

    <section id="area-vote" class="card hidden">
        <h3 id="display-title" style="margin-top:0; color: #2c3e50;">載入中...</h3>
        <select id="user-category"></select>
        <textarea id="user-input" rows="3" placeholder="請詳細描述您的建議或問題..."></textarea>
        <button id="submit-btn" class="btn" style="background: var(--student); color:white; width: 100%; justify-content:center; padding: 15px; font-size: 1.1rem;" onclick="submitFeedback()">確認提交意見</button>
    </section>

    <div class="search-container">
        <span style="margin-right: 10px;">🔍</span>
        <input type="text" id="search-input" placeholder="關鍵字搜尋..." oninput="renderFeedbacks()">
        <select id="sort-type" onchange="renderFeedbacks()" style="width: auto; border: none; background: transparent; font-weight:bold; margin-bottom: 0;">
            <option value="new">🆕 最新</option>
            <option value="hot">🔥 熱門</option>
        </select>
    </div>

    <div class="filter-bar" id="filter-bar"></div>

    <div id="feedback-list"></div>
</div>

<script>
    // 【重要】填入您的 GAS 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbywLsr636RXm4Oz4sKXYg2GIeVBUVIHwrkgLATaF4_EzjcBvlRDAs-py4lTpEqiaDp0/exec"; 
    
    const role = new URLSearchParams(window.location.search).get('role') || 'viewer';
    let allData = { feedbacks: [], config: {} };
    let currentFilter = "全部";

    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`${GAS_URL}?action=read`);
            allData = await res.json();
            refreshUI();
        } catch (e) { 
            console.error("無法讀取資料庫", e); 
            alert("資料讀取失敗，請檢查 GAS 網址是否正確。");
        }
        document.getElementById('loading').style.display = 'none';
    }

    // --- 確保此函數包含套用背景的邏輯 ---
    function refreshUI() {
        // 1. 套用標題與背景顏色
        document.getElementById('display-title').innerText = allData.config.title || "意見收集箱";
        
        // 核心修正：確保拿到 bgColor 後套用到 body
        if (allData.config.bgColor) {
            document.body.style.backgroundColor = allData.config.bgColor;
            if (role === 'admin') {
                document.getElementById('bg-picker').value = allData.config.bgColor;
            }
        }

        // 2. 更新公告
        if (allData.config.notice && allData.config.notice.trim() !== "") {
            document.getElementById('area-notice').classList.remove('hidden');
            document.getElementById('notice-content').innerHTML = "<b>📢 最新公告：</b><br>" + allData.config.notice;
        } else {
            document.getElementById('area-notice').classList.add('hidden');
        }

        // 3. 管理員欄位預填
        if(role === 'admin') {
            document.getElementById('input-title').value = allData.config.title;
            document.getElementById('input-notice').value = allData.config.notice;
            document.getElementById('input-categories').value = allData.config.categories;
        }

        // 4. 動態生成分類選單
        const cats = (allData.config.categories || "生活,學業,活動,其他").split(',').map(c => c.trim());
        document.getElementById('user-category').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        
        // 5. 動態生成過濾標籤
        document.getElementById('filter-bar').innerHTML = ["全部", ...cats].map(c => 
            `<button class="filter-btn ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}', this)">${c}</button>`
        ).join('');

        renderFeedbacks();
    }

    function setFilter(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFeedbacks();
    }

    function renderFeedbacks() {
        const list = document.getElementById('feedback-list');
        const query = document.getElementById('search-input').value.toLowerCase();
        const sort = document.getElementById('sort-type').value;

        let filtered = allData.feedbacks.filter(i => {
            const matchesCat = currentFilter === "全部" || i.category === currentFilter;
            return matchesCat && (i.text.toLowerCase().includes(query) || i.category.toLowerCase().includes(query));
        });

        sort === 'hot' ? filtered.sort((a,b) => b.likes - a.likes) : filtered.sort((a,b) => b.id - a.id);
        
        list.innerHTML = filtered.length ? filtered.map(item => `
            <div class="feedback-card">
                ${role === 'admin' ? `<button onclick="deleteItem(${item.id})" style="position:absolute; right:15px; top:15px; border:none; background:#ff4757; color:white; border-radius:50%; width:26px; height:26px; cursor:pointer; font-weight:bold;">×</button>` : ''}
                <div class="tag"># ${item.category}</div>
                <div style="line-height:1.8; color:#2c3e50; margin-bottom:15px; font-size: 1.05rem;">${item.text}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.85rem; color:#999;">
                    <span>📅 ${new Date(item.time).toLocaleDateString()}</span>
                    <button onclick="toggleLike(${item.id}, this)" style="background:white; border:1.5px solid #eee; padding:6px 15px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:5px; transition: 0.2s;">
                        ❤ <span style="color:#e91e63; font-weight:bold;">${item.likes}</span>
                    </button>
                </div>
            </div>
        `).join('') : '<p style="text-align:center; color:#999; margin-top:50px; font-weight:500;">目前沒有相關建議內容...</p>';
    }

    async function saveConfig() {
        const config = {
            title: document.getElementById('input-title').value,
            notice: document.getElementById('input-notice').value,
            categories: document.getElementById('input-categories').value,
            bgColor: document.getElementById('bg-picker').value
        };
        const params = new URLSearchParams({ action: 'updateConfig', data: JSON.stringify(config) });
        
        document.getElementById('loading').style.display = 'flex';
        await fetch(`${GAS_URL}?${params.toString()}`, { mode: 'no-cors' });
        alert("🎉 雲端設定更新成功！");
        await fetchData();
    }

    async function submitFeedback() {
        const text = document.getElementById('user-input').value.trim();
        if(!text) return alert("請輸入意見內容！");
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "傳送中...";

        const params = new URLSearchParams({ action: 'submit', data: JSON.stringify({ category: document.getElementById('user-category').value, text: text }) });
        await fetch(`${GAS_URL}?${params.toString()}`, { mode: 'no-cors' });
        
        document.getElementById('user-input').value = "";
        alert("🚀 提交成功！感謝您的參與。");
        btn.disabled = false;
        btn.innerText = "確認提交意見";
        setTimeout(fetchData, 1500);
    }

    async function toggleLike(id, btn) {
        const span = btn.querySelector('span');
        span.innerText = parseInt(span.innerText) + 1;
        btn.style.borderColor = "#ffc1d6";
        btn.style.background = "#fff0f6";
        await fetch(`${GAS_URL}?action=like&id=${id}`, { mode: 'no-cors' });
    }

    async function deleteItem(id) {
        if(confirm("確定要刪除這條意見嗎？此操作無法還原。")) {
            await fetch(`${GAS_URL}?action=delete&id=${id}&role=admin`, { mode: 'no-cors' });
            fetchData();
        }
    }

    function exportToCSV() {
        let csv = "\uFEFF時間,分類,內容,按讚數\n";
        allData.feedbacks.forEach(i => csv += `${new Date(i.time).toLocaleString()},${i.category},"${i.text.replace(/"/g,'""')}",${i.likes}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `學生意見匯出_${new Date().toLocaleDateString()}.csv`; 
        link.click();
    }

    // 初始化與權限判斷
    if (role === 'admin') {
        document.getElementById('area-admin').classList.remove('hidden');
        new QRCode(document.getElementById("qr-student"), { text: window.location.origin + window.location.pathname + "?role=student", width: 100, height: 100 });
        document.getElementById('qr-student').innerHTML += "<div style='font-size:12px; margin-top:5px; color:#666;'>作答版 QR</div>";
    }
    if (role !== 'viewer') document.getElementById('area-vote').classList.remove('hidden');
    document.getElementById('status-tag').innerText = role === 'admin' ? "🔴 管理模式" : (role === 'student' ? "🟢 作答模式" : "🔵 瀏覽模式");
    
    fetchData();
</script>
</body>
</html>
