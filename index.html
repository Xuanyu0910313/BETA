<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>學生會意見平台 - 旗艦同步版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --admin: #e74c3c; --student: #2ecc71; --viewer: #3498db; --card-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 50px; transition: background 0.3s; }
        nav { background: #fff; color: #2c3e50; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index: 100; box-shadow: 0 1px 10px rgba(0,0,0,0.05); }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .admin-card { border: 2px solid var(--admin); border-radius: 12px; padding: 25px; background: white; margin-bottom: 25px; }
        .search-container { background: white; border-radius: 30px; padding: 5px 20px; display: flex; align-items: center; box-shadow: var(--card-shadow); margin-bottom: 20px; border: 1px solid #eee; }
        .search-container input { border: none; padding: 12px; outline: none; flex-grow: 1; font-size: 16px; background: transparent; }
        .filter-bar { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .filter-btn { padding: 8px 20px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; white-space: nowrap; transition: 0.2s; color: #666; font-weight: bold; }
        .filter-btn.active { background: #2c3e50; color: white; border-color: #2c3e50; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: var(--card-shadow); margin-bottom: 25px; }
        .feedback-card { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #f0f0f0; position: relative; }
        .tag { font-size: 0.75rem; background: #f0f2f5; padding: 4px 12px; border-radius: 8px; color: #555; font-weight: bold; margin-bottom: 12px; display: inline-block; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        textarea, select, input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-size: 1rem; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .hidden { display: none !important; }
    </style>
</head>
<body id="main-body">

<div id="loading" class="loading-overlay">
    <div style="width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--viewer); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 15px; color: #666;">正在同步雲端數據...</p>
</div>

<nav>
    <div style="font-weight: bold; font-size: 1.2rem;">🏫 學生會意見平台</div>
    <div id="status-tag" style="font-size: 0.8rem; background: #eee; padding: 5px 12px; border-radius: 20px;">連線中</div>
</nav>

<div class="container">
    <section id="area-admin" class="admin-card hidden">
        <h3 style="color: var(--admin); margin-top: 0;">⚙️ 管理員控制台</h3>
        <label>📢 公告內容：</label>
        <textarea id="input-notice" rows="2"></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
            <div><label>修改題目：</label><input type="text" id="input-title"></div>
            <div><label>分類(逗號隔開)：</label><input type="text" id="input-categories"></div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
            <label>背景顏色：</label><input type="color" id="bg-picker">
            <button class="btn" style="background: var(--admin); color: white;" onclick="saveConfig()">儲存所有設定</button>
            <button class="btn" style="background: #217346; color: white;" onclick="exportToCSV()">匯出資料</button>
        </div>
        <div id="qr-student" style="text-align:center; background:#fafafa; padding:10px; border-radius:8px; display:inline-block;"></div>
    </section>

    <section id="area-notice" class="card hidden" style="background: #fff9db; border: 2px solid #f59f00;">
        <div id="notice-content" style="white-space: pre-wrap; line-height: 1.6;"></div>
    </section>

    <section id="area-vote" class="card hidden">
        <h3 id="display-title" style="margin-top:0;">載入中...</h3>
        <select id="user-category"></select>
        <textarea id="user-input" rows="3" placeholder="請輸入您的建議內容..."></textarea>
        <button id="submit-btn" class="btn" style="background: var(--student); color:white; width: 100%; justify-content:center;" onclick="submitFeedback()">提交匿名建議</button>
    </section>

    <div class="search-container">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="搜尋關鍵字..." oninput="renderFeedbacks()">
        <select id="sort-type" onchange="renderFeedbacks()" style="width: auto; border: none; background: transparent; font-weight:bold;">
            <option value="new">🆕 最新</option>
            <option value="hot">🔥 熱門</option>
        </select>
    </div>

    <div class="filter-bar" id="filter-bar"></div>
    <div id="feedback-list"></div>
</div>

<script>
    const GAS_URL = "您的GAS網址"; 
    const role = new URLSearchParams(window.location.search).get('role') || 'viewer';
    let allData = { feedbacks: [], config: {} };
    let currentFilter = "全部";

    async function fetchData() {
        document.getElementById('loading').style.display = 'flex';
        try {
            const res = await fetch(`${GAS_URL}?action=read`);
            allData = await res.json();
            refreshUI();
        } catch (e) { console.error(e); }
        document.getElementById('loading').style.display = 'none';
    }

    function refreshUI() {
        document.getElementById('display-title').innerText = allData.config.title;
        document.body.style.backgroundColor = allData.config.bgColor;
        
        if (allData.config.notice) {
            document.getElementById('area-notice').classList.remove('hidden');
            document.getElementById('notice-content').innerHTML = "📢 <b>最新公告</b><br>" + allData.config.notice;
        } else { document.getElementById('area-notice').classList.add('hidden'); }

        if(role === 'admin') {
            document.getElementById('input-title').value = allData.config.title;
            document.getElementById('input-notice').value = allData.config.notice;
            document.getElementById('input-categories').value = allData.config.categories;
            document.getElementById('bg-picker').value = allData.config.bgColor;
        }

        const cats = (allData.config.categories || "生活,學業,活動,其他").split(',').map(c => c.trim());
        document.getElementById('user-category').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('filter-bar').innerHTML = ["全部", ...cats].map(c => 
            `<button class="filter-btn ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}', this)">${c}</button>`
        ).join('');

        renderFeedbacks();
    }

    function setFilter(cat, btn) {
        currentFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFeedbacks();
    }

    function renderFeedbacks() {
        const list = document.getElementById('feedback-list');
        const query = document.getElementById('search-input').value.toLowerCase();
        const sort = document.getElementById('sort-type').value;

        let filtered = allData.feedbacks.filter(i => {
            const matchesCat = currentFilter === "全部" || i.category === currentFilter;
            return matchesCat && (i.text.toLowerCase().includes(query) || i.category.toLowerCase().includes(query));
        });

        sort === 'hot' ? filtered.sort((a,b) => b.likes - a.likes) : filtered.sort((a,b) => b.id - a.id);
        
        list.innerHTML = filtered.length ? filtered.map(item => `
            <div class="feedback-card">
                ${role === 'admin' ? `<button onclick="deleteItem(${item.id})" style="position:absolute; right:10px; top:10px; border:none; background:#ff4757; color:white; border-radius:50%; width:24px; height:24px; cursor:pointer;">×</button>` : ''}
                <div class="tag"># ${item.category}</div>
                <div style="line-height:1.6; color:#2c3e50; margin-bottom:15px;">${item.text}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.8rem; color:#999;">
                    <span>${new Date(item.time).toLocaleDateString()}</span>
                    <button onclick="toggleLike(${item.id}, this)" style="background:none; border:1px solid #eee; padding:5px 12px; border-radius:15px; cursor:pointer;">❤ <span>${item.likes}</span></button>
                </div>
            </div>
        `).join('') : '<p style="text-align:center; color:#999; margin-top:30px;">找不到相關意見...</p>';
    }

    async function saveConfig() {
        const config = {
            title: document.getElementById('input-title').value,
            notice: document.getElementById('input-notice').value,
            categories: document.getElementById('input-categories').value,
            bgColor: document.getElementById('bg-picker').value
        };
        const params = new URLSearchParams({ action: 'updateConfig', data: JSON.stringify(config) });
        await fetch(`${GAS_URL}?${params.toString()}`, { mode: 'no-cors' });
        alert("雲端設定已更新！");
        fetchData();
    }

    async function submitFeedback() {
        const text = document.getElementById('user-input').value.trim();
        if(!text) return alert("請輸入內容");
        const params = new URLSearchParams({ action: 'submit', data: JSON.stringify({ category: document.getElementById('user-category').value, text: text }) });
        await fetch(`${GAS_URL}?${params.toString()}`, { mode: 'no-cors' });
        document.getElementById('user-input').value = "";
        alert("提交成功！");
        setTimeout(fetchData, 1500);
    }

    async function toggleLike(id, btn) {
        const span = btn.querySelector('span');
        span.innerText = parseInt(span.innerText) + 1;
        await fetch(`${GAS_URL}?action=like&id=${id}`, { mode: 'no-cors' });
    }

    async function deleteItem(id) {
        if(confirm("確定刪除？")) {
            await fetch(`${GAS_URL}?action=delete&id=${id}&role=admin`, { mode: 'no-cors' });
            fetchData();
        }
    }

    function exportToCSV() {
        let csv = "\uFEFF時間,分類,內容,按讚\n";
        allData.feedbacks.forEach(i => csv += `${new Date(i.time).toLocaleString()},${i.category},"${i.text.replace(/"/g,'""')}",${i.likes}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = "意見匯出.csv"; link.click();
    }

    if (role === 'admin') {
        document.getElementById('area-admin').classList.remove('hidden');
        new QRCode(document.getElementById("qr-student"), { text: window.location.origin + window.location.pathname + "?role=student", width: 100, height: 100 });
    }
    if (role !== 'viewer') document.getElementById('area-vote').classList.remove('hidden');
    document.getElementById('status-tag').innerText = role === 'admin' ? "🔴 管理模式" : (role === 'student' ? "🟢 作答模式" : "🔵 瀏覽模式");
    fetchData();
</script>
<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
